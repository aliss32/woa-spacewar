name: Build Spacewar UEFI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build UEFI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # iasl için acpica-tools eklenmesi Ubuntu ortamında daha güvenlidir
          sudo apt-get install -y build-essential uuid-dev acpica-tools git nasm \
          python3 python3-setuptools python3-dev gcc-aarch64-linux-gnu

      - name: Compile BaseTools
        run: |
          make -C BaseTools

      - name: Build Spacewar UEFI
        run: |
          # Ortam değişkenlerini ayarlıyoruz
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          export WORKSPACE=$PWD
          export PACKAGES_PATH=$PWD:$PWD/Silicon:$PWD/Platform
          
          # EDK2 ortamını aynı terminal oturumunda (shell) yüklüyoruz
          source edksetup.sh
          
          # Derleme işlemini başlatıyoruz
          build -a AARCH64 \
                -p Platform/Nothing/sm7325/spacewar.dsc \
                -t GCC5 \
                -b RELEASE \
                -D FIRMWARE_VER=0.1
                
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Spacewar-UEFI-Release
          # Çıktı klasöründeki .fd ve .img imajlarını alır
          path: |
            Build/spacewar/RELEASE_GCC5/FV/*.fd
            Build/spacewar/RELEASE_GCC5/FV/*.img
          if-no-files-found: warn
