name: Build WOA-Spacewar UEFI

on:
  workflow_dispatch:
  push:
    paths:
      - 'UEFI/**'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential uuid-dev iasl git nasm \
            python3 python3-distutils python3-pil python3-git \
            gcc-aarch64-linux-gnu clang llvm lld \
            mono-devel acpica-tools gettext \
            libsdl2-2.0-0 libsdl2-dev abootimg

      - name: Clone edk2-msm
        run: |
          git clone https://github.com/edk2-porting/edk2-msm.git \
            --recursive --depth=1 edk2-msm

      - name: Copy Spacewar files into edk2-msm
        run: |
          # Device config
          cp UEFI/configs/devices/spacewar.conf \
             edk2-msm/configs/devices/spacewar.conf

          # Platform/Nothing/sm7325/
          mkdir -p edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar
          mkdir -p edk2-msm/Platform/Nothing/sm7325/FdtBlob

          cp UEFI/Platform/Nothing/sm7325/spacewar.dsc \
             edk2-msm/Platform/Nothing/sm7325/spacewar.dsc
          cp UEFI/Platform/Nothing/sm7325/spacewar.fdf.inc \
             edk2-msm/Platform/Nothing/sm7325/spacewar.fdf.inc
          cp UEFI/Platform/Nothing/sm7325/AcpiTables/spacewar/DSDT.asl \
             edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar/DSDT.asl

          # DTB - Xiaomi/sm7325'den kopyala (sm7325 için ortak DTB)
          cp edk2-msm/Platform/Xiaomi/sm7325/FdtBlob/sm7325-generic-msd.dtb \
             edk2-msm/Platform/Nothing/sm7325/FdtBlob/sm7325-generic-msd.dtb

          echo "=== Kopyalanan dosyalar ==="
          find edk2-msm/Platform/Nothing -type f | sort

      - name: Compile DSDT.asl to DSDT.aml
        run: |
          iasl -p edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar/DSDT \
               edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar/DSDT.asl
          echo "=== AcpiTables ==="
          ls -la edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar/

      - name: Build UEFI
        run: |
          cd edk2-msm
          ./build.sh -d spacewar -r RELEASE

      - name: Upload boot image
        uses: actions/upload-artifact@v4
        with:
          name: boot-spacewar-${{ github.run_number }}
          path: edk2-msm/boot-spacewar.img
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Spacewar UEFI Build #${{ github.run_number }}"
          body: |
            ## WOA-Spacewar UEFI Build #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            ### Test (safe - cihaza hiçbir şey yazılmaz)
            ```bash
            fastboot boot boot-spacewar.img
            ```
          files: edk2-msm/boot-spacewar.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
