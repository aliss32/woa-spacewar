name: Build Spacewar UEFI (Final Fix)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build UEFI for Nothing Phone (1)
    
    steps:
      - name: Checkout Local Repository
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential uuid-dev iasl git nasm \
          python3 python3-setuptools python3-dev gcc-aarch64-linux-gnu \
          device-tree-compiler bc abootimg

      - name: Setup Workspace Structure
        run: |
          # 1. Framework indir
          git clone --recursive https://github.com/edk2-porting/edk2-msm.git --depth 1 edk2_base
          
          # 2. Simple-Init'i ALT MODÜLLERİYLE (recursive) beraber indir
          # Hatanın çözümü bu satırdaki --recursive ekidir.
          git clone --recursive https://github.com/BigfootACA/simple-init.git SimpleInit
          
          # 3. Kendi dosyalarını kopyala
          cp -r UEFI/Platform edk2_base/
          
          # 4. Binary sürücüleri çek
          git clone https://github.com/edk2-porting/edk2-msm-binary.git --depth 1 binaries
          mkdir -p edk2_base/Platform/EFI_Binaries/Drivers/Devices/spacewar
          cp -r binaries/Drivers/sm7325/* edk2_base/Platform/EFI_Binaries/Drivers/Devices/spacewar/ || true

      - name: Compile ACPI Tables (DSDT)
        run: |
          # ACPI kaynak kodlarının olduğu dizine git
          cd UEFI/Platform/Nothing/sm7325/AcpiTables/spacewar/
          
          # DSDT.asl dosyasını derleyerek DSDT.aml oluştur
          # cpu.asl, DSDT.asl içinde include edildiyse otomatik dahil edilir
          iasl -p DSDT.aml Dsdt.asl
          
          # Derlenen dosyayı derleyicinin arayacağı klasöre kopyala
          mkdir -p ../../../../../../edk2_base/Platform/Nothing/sm7325/AcpiTables/spacewar/
          cp DSDT.aml ../../../../../../edk2_base/Platform/Nothing/sm7325/AcpiTables/spacewar/

      - name: Build BaseTools
        run: |
          cd edk2_base/Common/edk2
          # GCC 13+ Yaması
          sed -i '1i #include <stdint.h>' BaseTools/Source/C/VfrCompile/VfrCompiler.cpp
          sed -i '1i #include <stdint.h>' BaseTools/Source/C/VfrCompile/VfrUtilityLib.cpp
          make -C BaseTools

      - name: Build Spacewar UEFI
        run: |
          # Cross-Compiler tanımla
          export GCC5_AARCH64_PREFIX=aarch64-linux-gnu-
          
          cd edk2_base/Common/edk2
          . ./edksetup.sh
          
          # Tüm paket yollarını derleyiciye aç
          export PACKAGES_PATH=$GITHUB_WORKSPACE/edk2_base:$GITHUB_WORKSPACE/edk2_base/Common/edk2:$GITHUB_WORKSPACE/SimpleInit
          
          # Derleme komutunu çalıştır
          build -a AARCH64 \
                -p $GITHUB_WORKSPACE/edk2_base/Platform/Nothing/sm7325/spacewar.dsc \
                -t GCC5 \
                -b RELEASE

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spacewar-uefi
          path: edk2_base/Build/spacewar/RELEASE_GCC5/FV/sm7325_UEFI.fd
