name: Build WOA-Spacewar UEFI

on:
  workflow_dispatch:
  push:
    paths:
      - 'UEFI/**'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential uuid-dev iasl git nasm \
            python3 python3-distutils python3-pil python3-git \
            gcc-aarch64-linux-gnu clang llvm lld \
            mono-devel acpica-tools gettext \
            libsdl2-2.0-0 libsdl2-dev abootimg

      - name: Clone edk2-msm
        run: |
          git clone https://github.com/edk2-porting/edk2-msm.git \
            --recursive --depth=1 edk2-msm

      - name: Copy Spacewar files into edk2-msm
        run: |
          # Device config
          cp UEFI/configs/devices/spacewar.conf \
             edk2-msm/configs/devices/spacewar.conf

          # Platform files - Platform/Qualcomm/sm7325/ (lisa ile aynı konum)
          mkdir -p edk2-msm/Platform/Qualcomm/sm7325/AcpiTables/spacewar

          cp UEFI/Platform/Qualcomm/sm7325/spacewar.dsc \
             edk2-msm/Platform/Qualcomm/sm7325/spacewar.dsc
          cp UEFI/Platform/Qualcomm/sm7325/spacewar.fdf.inc \
             edk2-msm/Platform/Qualcomm/sm7325/spacewar.fdf.inc
          cp UEFI/Platform/Qualcomm/sm7325/AcpiTables/DSDT.asl \
             edk2-msm/Platform/Qualcomm/sm7325/AcpiTables/spacewar/DSDT.asl

          echo "=== Kopyalanan dosyalar ==="
          find edk2-msm/Platform/Qualcomm/sm7325 -name "spacewar*" -o -name "DSDT*" | sort

      - name: Build UEFI
        run: |
          cd edk2-msm
          ./build.sh -d spacewar -r RELEASE

      - name: Upload boot image
        uses: actions/upload-artifact@v4
        with:
          name: boot-spacewar-${{ github.run_number }}
          path: edk2-msm/boot-spacewar.img
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Spacewar UEFI Build #${{ github.run_number }}"
          body: |
            ## WOA-Spacewar UEFI Build #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            ### Test (safe - cihaza hiçbir şey yazılmaz)
            ```bash
            fastboot boot boot-spacewar.img
            ```
          files: edk2-msm/boot-spacewar.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
