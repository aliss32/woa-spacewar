name: Build WOA-Spacewar UEFI

on:
  workflow_dispatch:
  push:
    paths:
      - 'UEFI/**'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential uuid-dev iasl git nasm \
            python3 python3-distutils python3-pil python3-git \
            gcc-aarch64-linux-gnu clang llvm lld \
            mono-devel acpica-tools gettext \
            libsdl2-2.0-0 libsdl2-dev abootimg \
            device-tree-compiler

      - name: Clone edk2-msm
        run: |
          git clone https://github.com/edk2-porting/edk2-msm.git \
            --recursive --depth=1 edk2-msm

      - name: Build spacewar DTB from CrDroid kernel DT
        run: |
          # CrDroid'in spacewar kernel DT'si - zaten çalışan kaynak
          git clone --depth=1 \
            https://github.com/crdroidandroid/android_device_nothing_Spacewar.git \
            -b 14.0 crdroid_device

          # Spacewar DTB'yi bul
          echo "=== Mevcut DTB dosyaları ==="
          find crdroid_device -name "*.dtb" | head -10

          DTB=$(find crdroid_device -name "*spacewar*.dtb" \
                -o -name "*sm7325*spacewar*.dtb" 2>/dev/null | head -1)

          if [ -n "$DTB" ]; then
            echo "DTB bulundu: $DTB"
            cp "$DTB" spacewar.dtb
          else
            echo "Pre-built DTB yok, ExTV kernel DT'sinden derleniyor..."
            git clone --depth=1 \
              https://github.com/ExTV/android_kernel_devicetree_nothing_sm7325.git \
              kernel_dt
            DTS=$(find kernel_dt -name "*spacewar*.dts" \
                  -o -name "*yupik*spacewar*.dts" 2>/dev/null | head -1)
            if [ -n "$DTS" ]; then
              echo "DTS bulundu: $DTS"
              dtc -I dts -O dtb -o spacewar.dtb "$DTS" 2>/dev/null || \
                cp edk2-msm/Platform/Xiaomi/sm7325/FdtBlob_compat/lisa.dtb spacewar.dtb
            else
              echo "DTS bulunamadı, lisa.dtb fallback kullanılıyor"
              cp edk2-msm/Platform/Xiaomi/sm7325/FdtBlob_compat/lisa.dtb spacewar.dtb
            fi
          fi

          ls -la spacewar.dtb

      - name: Copy Spacewar files into edk2-msm
        run: |
          cp UEFI/configs/devices/spacewar.conf \
             edk2-msm/configs/devices/spacewar.conf

          mkdir -p edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar
          mkdir -p edk2-msm/Platform/Nothing/sm7325/FdtBlob
          mkdir -p edk2-msm/Platform/Nothing/sm7325/FdtBlob_compat

          cp UEFI/Platform/Nothing/sm7325/spacewar.dsc \
             edk2-msm/Platform/Nothing/sm7325/spacewar.dsc
          cp UEFI/Platform/Nothing/sm7325/spacewar.fdf.inc \
             edk2-msm/Platform/Nothing/sm7325/spacewar.fdf.inc
          cp UEFI/Platform/Nothing/sm7325/AcpiTables/spacewar/DSDT.asl \
             edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar/DSDT.asl

          cp edk2-msm/Platform/Xiaomi/sm7325/FdtBlob/sm7325-generic-msd.dtb \
             edk2-msm/Platform/Nothing/sm7325/FdtBlob/sm7325-generic-msd.dtb

          cp spacewar.dtb \
             edk2-msm/Platform/Nothing/sm7325/FdtBlob_compat/spacewar.dtb

          echo "=== Kopyalanan dosyalar ==="
          find edk2-msm/Platform/Nothing -type f | sort

      - name: Compile DSDT.asl to DSDT.aml
        run: |
          iasl -p edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar/DSDT \
               edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar/DSDT.asl
          ls -la edk2-msm/Platform/Nothing/sm7325/AcpiTables/spacewar/

      - name: Build UEFI
        run: |
          cd edk2-msm
          ./build.sh -d spacewar -r RELEASE -D USE_UART=1

      - name: Upload boot image
        uses: actions/upload-artifact@v4
        with:
          name: boot-spacewar-${{ github.run_number }}
          path: edk2-msm/boot-spacewar.img
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Spacewar UEFI Build #${{ github.run_number }}"
          body: |
            ## WOA-Spacewar UEFI Build #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            ### Test (safe - cihaza hiçbir şey yazılmaz)
            ```bash
            fastboot boot boot-spacewar.img
            ```
          files: edk2-msm/boot-spacewar.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
