name: Build WOA-Spacewar UEFI

on:
  workflow_dispatch:
  push:
    paths:
      - 'UEFI/**'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential uuid-dev iasl git nasm \
            python3 python3-distutils python3-pil python3-git \
            gcc-aarch64-linux-gnu clang llvm lld \
            mono-devel acpica-tools gettext \
            libsdl2-2.0-0 libsdl2-dev abootimg

      - name: Clone edk2-msm
        run: |
          git clone https://github.com/edk2-porting/edk2-msm.git \
            --recursive --depth=1 edk2-msm

      - name: Show edk2-msm structure
        run: |
          echo "=== Platform vendors ==="
          ls edk2-msm/Platform/
          echo ""
          echo "=== configs/devices sample ==="
          ls edk2-msm/configs/devices/ | head -5
          echo ""
          echo "=== Sample device conf ==="
          cat edk2-msm/configs/devices/lisa.conf 2>/dev/null || \
            cat edk2-msm/configs/devices/$(ls edk2-msm/configs/devices/ | head -1)

      - name: Copy Spacewar files into edk2-msm
        run: |
          cp UEFI/configs/devices/spacewar.conf \
             edk2-msm/configs/devices/spacewar.conf

          mkdir -p edk2-msm/Platform/Nothing/sm7325/AcpiTables

          cp UEFI/Platform/Nothing/sm7325/spacewar.dsc \
             edk2-msm/Platform/Nothing/sm7325/spacewar.dsc
          cp UEFI/Platform/Nothing/sm7325/spacewar.fdf.inc \
             edk2-msm/Platform/Nothing/sm7325/spacewar.fdf.inc
          cp UEFI/Platform/Nothing/sm7325/AcpiTables/DSDT.asl \
             edk2-msm/Platform/Nothing/sm7325/AcpiTables/DSDT.asl

          echo "=== Copied files ==="
          find edk2-msm/Platform/Nothing -type f
          echo ""
          echo "=== spacewar.conf ==="
          cat edk2-msm/configs/devices/spacewar.conf

      - name: Build UEFI
        run: |
          cd edk2-msm
          ./build.sh --device spacewar --release

      - name: Upload boot image
        uses: actions/upload-artifact@v4
        with:
          name: boot-spacewar
          path: edk2-msm/boot-spacewar.img
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Spacewar UEFI Build #${{ github.run_number }}"
          body: |
            ## WOA-Spacewar UEFI Build #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            ### Test (safe - nothing written to device)
            ```bash
            fastboot boot boot-spacewar.img
            ```
          files: edk2-msm/boot-spacewar.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
