name: Build WOA-Spacewar UEFI

on:
  workflow_dispatch:
  push:
    paths:
      - 'UEFI/**'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential uuid-dev iasl git nasm \
            python3 python3-distutils \
            gcc-aarch64-linux-gnu \
            clang llvm lld \
            mono-devel acpica-tools

      - name: Clone edk2-msm
        run: |
          git clone https://github.com/edk2-porting/edk2-msm.git \
            --recursive --depth=1 edk2-msm

      - name: DEBUG - Show edk2-msm Platform structure
        run: |
          echo "=== edk2-msm Platform structure ==="
          find edk2-msm/Platform -maxdepth 3 -type d | sort
          echo ""
          echo "=== Example device (lisa) ==="
          ls edk2-msm/Platform/Device/lisa/ 2>/dev/null || echo "lisa not found"
          echo ""
          echo "=== build.sh usage ==="
          cat edk2-msm/build.sh | head -50

      - name: Copy Spacewar device tree
        run: |
          # Hedef klasörü oluştur
          mkdir -p edk2-msm/Platform/Device/spacewar
          mkdir -p edk2-msm/Platform/Device/spacewar/ACPI
          # Dosyaları kopyala
          cp -r UEFI/Platform/Device/spacewar/. edk2-msm/Platform/Device/spacewar/
          echo "Copied files:"
          ls -la edk2-msm/Platform/Device/spacewar/

      - name: Build UEFI
        run: |
          cd edk2-msm
          ./build.sh --device spacewar --release

      - name: Upload boot image
        uses: actions/upload-artifact@v4
        with:
          name: boot-spacewar
          path: edk2-msm/boot-spacewar.img
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Spacewar UEFI Build #${{ github.run_number }}"
          body: |
            ## WOA-Spacewar UEFI Build #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            ### Test (safe - nothing written to device)
            ```bash
            fastboot boot boot-spacewar.img
            ```
          files: edk2-msm/boot-spacewar.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
