name: Build Spacewar UEFI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential uuid-dev iasl git nasm python3-distutils

      - name: Setup EDK2
        run: |
          make -C BaseTools
          source edksetup.sh

      - name: Build Spacewar UEFI
        run: |
          # Görseldeki yeni dizin yapısına göre yollar
          DEVICE_DSC="Platform/Nothing/sm7325/spacewar.dsc"
          
          build -a AARCH64 \
                -p "$DEVICE_DSC" \
                -t GCC5 \
                -b RELEASE \
                -D FIRMWARE_VER=0.1
                
      - name: Upload Artifacts
        uses: actions/checkout@v4
        with:
          name: spacewar-uefi
          path: Build/spacewar/RELEASE_GCC5/FV/
