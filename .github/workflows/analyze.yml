name: Spacewar Hardware Analysis

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y python3 git

      - name: Clone CrDroid device tree
        run: |
          git clone --depth=1 -b 14.0 \
            https://github.com/crdroidandroid/android_device_nothing_Spacewar.git \
            sources/crdroid_device

      - name: Clone Nothing kernel DT
        run: |
          git clone --depth=1 \
            https://github.com/ExTV/android_kernel_devicetree_nothing_sm7325.git \
            sources/kernel_dt

      - name: Run analysis
        run: |
          python3 Scripts/analyze_hardware.py \
            --crdroid sources/crdroid_device \
            --kernel  sources/kernel_dt \
            --output  Analysis/hardware_report.json

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Analysis/
          git diff --staged --quiet || \
            git commit -m "analysis: update hardware_report.json [bot]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hardware-report
          path: Analysis/hardware_report.json
