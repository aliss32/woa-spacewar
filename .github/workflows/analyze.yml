name: Auto-Sync Everything

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

# Bot'un kendi commit'i bu workflow'u tekrar tetiklemesin
concurrency:
  group: auto-sync
  cancel-in-progress: true

jobs:
  sync:
    # Bot commit'i tetiklememesi için kontrol
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y python3 git

      # ── Kaynak repoları clone et ──────────────────────
      - name: Clone CrDroid device tree
        run: |
          git clone --depth=1 -b 14.0 \
            https://github.com/crdroidandroid/android_device_nothing_Spacewar.git \
            sources/crdroid_device

      - name: Clone Nothing kernel DT
        run: |
          git clone --depth=1 \
            https://github.com/ExTV/android_kernel_devicetree_nothing_sm7325.git \
            sources/kernel_dt

      - name: Clone HalogenOS device tree
        run: |
          git clone --depth=1 -b XOS-16.0 \
            https://github.com/halogenOS/android_device_nothing_Spacewar.git \
            sources/halogenos_device || true

      - name: Clone CrDroid vendor
        run: |
          git clone --depth=1 -b 16.0 \
            https://github.com/crdroidandroid/proprietary_vendor_nothing_Spacewar.git \
            sources/vendor || true

      # ── Analiz ───────────────────────────────────────
      - name: Run hardware analysis
        run: |
          python3 Scripts/analyze_hardware.py \
            --crdroid   sources/crdroid_device \
            --kernel    sources/kernel_dt \
            --halogenos sources/halogenos_device \
            --vendor    sources/vendor \
            --output    Analysis/hardware_report.json

      # ── Metadata ekle ─────────────────────────────────
      - name: Add metadata to report
        run: |
          python3 - <<'EOF'
          import json, subprocess, datetime

          with open('Analysis/hardware_report.json') as f:
              r = json.load(f)

          def git_commit(path):
              try:
                  return subprocess.check_output(
                      ['git', '-C', path, 'rev-parse', '--short', 'HEAD'],
                      text=True).strip()
              except:
                  return 'unknown'

          r['meta']['updated_at'] = datetime.datetime.utcnow().isoformat() + 'Z'
          r['meta']['source_commits'] = {
              'crdroid_device':   git_commit('sources/crdroid_device'),
              'kernel_dt':        git_commit('sources/kernel_dt'),
              'halogenos_device': git_commit('sources/halogenos_device'),
              'vendor':           git_commit('sources/vendor'),
          }
          r['meta']['readable_url'] = (
              'https://raw.githubusercontent.com/aliss32/woa-spacewar/main/'
              'Analysis/hardware_report.json'
          )

          with open('Analysis/hardware_report.json', 'w') as f:
              json.dump(r, f, indent=2)

          print('✅ Metadata added')
          print(f'   Updated : {r["meta"]["updated_at"]}')
          print(f'   URL     : {r["meta"]["readable_url"]}')
          EOF

      # ── Özet ──────────────────────────────────────────
      - name: Print report summary
        run: |
          python3 -c "
          import json
          with open('Analysis/hardware_report.json') as f:
              r = json.load(f)
          uv = r.get('UEFI_Values', {})
          st = r.get('Status', {})
          m  = r.get('meta', {})
          print()
          print('══════════════════════════════════════')
          print('   SPACEWAR — AUTO SYNC COMPLETE')
          print('══════════════════════════════════════')
          print(f'  Updated      : {m.get(\"updated_at\",\"?\")}')
          print(f'  WiFi         : {uv.get(\"WIFI_CHIP\",\"?\")}')
          print(f'  Display      : {uv.get(\"DISPLAY_WIDTH\")}x{uv.get(\"DISPLAY_HEIGHT\")} @ {uv.get(\"DISPLAY_FPS\")}Hz')
          print(f'  Touch IC     : {uv.get(\"TOUCH_IC\",\"?\")}')
          print(f'  Touch I2C    : {uv.get(\"TOUCH_I2C_ADDR\",\"?\")}')
          print(f'  Touch RST    : GPIO {uv.get(\"TOUCH_RESET_GPIO\",\"?\")}')
          print(f'  Touch IRQ    : GPIO {uv.get(\"TOUCH_IRQ_GPIO\",\"?\")}')
          print(f'  Power Key    : GPIO {uv.get(\"POWER_KEY_GPIO\",\"?\")}')
          print(f'  Audio        : {uv.get(\"AUDIO_CODEC\",\"?\")}')
          print(f'  Speaker Amp  : {uv.get(\"VIBRATOR_IC\",\"?\")}')
          print(f'  NFC          : {uv.get(\"NFC_IC\",\"?\")}')
          print(f'  TODOs left   : {st.get(\"todo_count\",\"?\")}')
          for t in st.get('todo_fields', []):
              print(f'    ⏳ {t}')
          print()
          print(f'  Readable URL : {r[\"meta\"].get(\"readable_url\",\"?\")}')
          "

      # ── Commit ────────────────────────────────────────
      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Analysis/hardware_report.json
          git diff --staged --quiet || \
            git commit -m "sync: auto-update hardware_report.json [$(date -u +%Y-%m-%d)] [bot]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Artifact ──────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hardware-report-${{ github.run_number }}
          path: Analysis/hardware_report.json
