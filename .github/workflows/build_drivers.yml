name: Build Spacewar Drivers

on:
  push:
    branches:
      - main
    paths:
      - 'Drivers/windows_oem_nothing_spacewar/**'
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build_drivers:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Archive Driver Package
        run: |
          Compress-Archive -Path "Drivers/windows_oem_nothing_spacewar/*" -DestinationPath "Spacewar_Drivers_Native.zip" -Force

      - name: Upload Driver Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Spacewar_Drivers_Native
          path: Spacewar_Drivers_Native.zip

      - name: Upload to Release
        if: github.event_name == 'release' || github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: Spacewar_Drivers_Native.zip
          tag_name: "v1.0.0-native"
          name: "Native Driver Package v1.0"
          body: "100% Native Spacewar Driver Port (PMIC, Touch, Audio)"
          draft: false
          prerelease: true
