name: Extract Memory Map from DTB

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse DTB for GIC and UART
        run: |
          python3 - <<'EOF'
          import struct, sys
          
          dtb_path = 'DTB/spacewar-yupik.dtb'
          try:
              with open(dtb_path, 'rb') as f:
                  dtb = f.read()
          except FileNotFoundError:
              print(f"Error: {dtb_path} not found.")
              sys.exit(1)
              
          magic = struct.unpack_from('>I', dtb, 0)[0]
          if magic != 0xD00DFEED:
              print("Invalid DTB Magic")
              sys.exit(1)
              
          off_struct = struct.unpack_from('>I', dtb, 8)[0]
          off_strings = struct.unpack_from('>I', dtb, 12)[0]
          FDT_BEGIN_NODE=1; FDT_END_NODE=2; FDT_PROP=3; FDT_END=9
          pos=off_struct; depth=0
          node_stack = []
          current_node = ''
          
          print("=== Spacewar Memory Map Extraction ===")
          try:
              while pos < len(dtb)-4:
                  t = struct.unpack_from('>I', dtb, pos)[0]; pos+=4
                  if t == FDT_BEGIN_NODE:
                      ne=dtb.index(b'\x00',pos)
                      node_name = dtb[pos:ne].decode('ascii', 'replace')
                      depth+=1; pos=ne+1; pos=(pos+3)&~3
                      node_stack.append(node_name)
                      current_node = '/'.join(node_stack)
                  elif t == FDT_PROP:
                      pl=struct.unpack_from('>I',dtb,pos)[0]
                      no=struct.unpack_from('>I',dtb,pos+4)[0]
                      pne=dtb.index(b'\x00',off_strings+no)
                      pname=dtb[off_strings+no:pne].decode('ascii','replace')
                      pval=dtb[pos+8:pos+8+pl]; pos+=8+pl; pos=(pos+3)&~3
                      
                      if current_node and ('interrupt-controller' in current_node or 'serial' in current_node):
                          if pname == 'reg':
                              regs = [struct.unpack_from('>I', pval, i)[0] for i in range(0, len(pval), 4)]
                              print(f'➜ {current_node} -> reg: {[hex(x) for x in regs]}')
                  elif t == FDT_END_NODE:
                      depth-=1
                      if node_stack: node_stack.pop()
                      if depth==0: break
                  elif t == FDT_END: break
          except Exception as e: 
              print(f"Error parsing: {e}")
          print("=== Extraction Finished ===")
          EOF
