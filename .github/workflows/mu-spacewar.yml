name: Build Mu-Silicium UEFI for Spacewar

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: false
        default: 'DEBUG'
        type: choice
        options: [DEBUG, RELEASE]

env:
  CI_BUILD: "false"                       # Skip setup_env.sh full-upgrade
  PIP_BREAK_SYSTEM_PACKAGES: "1"
  CLANGPDB_AARCH64_PREFIX: aarch64-linux-gnu-

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { path: woa-spacewar }

      - name: Setup Python
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Clone Mu-Silicium
        run: git clone https://github.com/Project-Silicium/Mu-Silicium.git --recursive --depth 1

      # ── Apply all patches in one step ──
      - name: Patch & Install Deps
        run: |
          # 1. Override MemoryMapLib (DTB-compliant)
          cp woa-spacewar/UEFI/upstream_overrides/MemoryMapLib.c \
             Mu-Silicium/Platforms/Nothing/spacewarPkg/Library/MemoryMapLib/MemoryMapLib.c

          # 2. Override ConfigurationMapLib (USB Host Mode: 0x0→0x1)
          cp woa-spacewar/UEFI/upstream_overrides/ConfigurationMapLib.c \
             Mu-Silicium/Platforms/Nothing/spacewarPkg/Library/ConfigurationMapLib/ConfigurationMapLib.c

          # 3. Remove MinidumpTADxe (TrustZone SMC crash on retail)
          find Mu-Silicium -type f \( -name "*.dsc" -o -name "*.fdf" -o -name "*.inc" \) \
            -exec sed -i '/MinidumpTADxe/d' {} +

          # 4. Install REQUIRED system packages (mono-devel is REQUIRED for nuget/ExtDep)
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu nasm lld clang llvm uuid-dev build-essential git ca-certificates mono-devel

          # 5. Install Python build tools
          pip install --no-cache-dir -r Mu-Silicium/pip-requirements.txt

      # ── Build ──
      - name: Build UEFI
        id: build
        run: |
          cd Mu-Silicium
          MODE="${{ github.event.inputs.build_type || 'DEBUG' }}"
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          bash ./build_uefi.sh -d spacewar -r $MODE 2>&1 | tee ../build.log
          exit ${PIPESTATUS[0]}

      # ── Upload firmware ──
      - name: Upload UEFI Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Mu-Spacewar-${{ steps.build.outputs.mode }}-${{ github.run_number }}
          path: Mu-Silicium/Mu-spacewar*

      # ── Upload logs (always) ──
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs-${{ github.run_number }}
          path: build.log
          retention-days: 7
