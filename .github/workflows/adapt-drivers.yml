name: "[Deprecated] Adapt Lisa Drivers for Spacewar"

# DEPRECATED: This workflow is superseded by native drivers in
# Drivers/windows_oem_nothing_spacewar/. Kept for reference only.
# Use build_drivers.yml for the current native driver build.

on:
  workflow_dispatch:

jobs:
  adapt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Lisa driver repo
        run: |
          git clone --depth=1 \
            https://github.com/AistopGit/windows_oem_xiaomi_lisa.git \
            lisa-drivers

      - name: Run adaptation script
        run: |
          python3 Scripts/adapt_drivers.py \
            lisa-drivers \
            Drivers/spacewar-adapted

      - name: Upload adapted drivers
        uses: actions/upload-artifact@v4
        with:
          name: spacewar-drivers-adapted
          path: Drivers/spacewar-adapted/
